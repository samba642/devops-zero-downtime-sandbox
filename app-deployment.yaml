apiVersion: v1
kind: ConfigMap
metadata:
  name: web-html-config
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Analytics Dashboard - Dummy App</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-gray-100 font-sans antialiased">
        <div class="flex h-screen">
            <div class="w-64 bg-gray-800 p-6 flex flex-col justify-between hidden md:flex border-r border-gray-700">
                <div>
                    <div class="flex items-center space-x-3 mb-8">
                        <div class="h-8 w-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white">Ω</div>
                        <span class="text-xl font-bold tracking-wider">AcmeCorp</span>
                    </div>
                    <nav class="space-y-2">
                        <a href="#" class="flex items-center space-x-3 bg-gray-900 text-indigo-400 p-3 rounded-lg font-medium"><span>📊</span> <span>Dashboard</span></a>
                    </nav>
                </div>
                <div class="text-xs text-gray-500 text-center">v2.0.0 (New Relese)</div>
            </div>
            <div class="flex-1 flex flex-col overflow-hidden">
                <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
                    <h1 class="text-xl font-semibold">Overview</h1>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">● EKS Active</span>
                </header>
                <main class="flex-1 bg-gray-900 p-6">
                    <div class="bg-gradient-to-r from-indigo-800 to-slate-800 p-8 rounded-xl border border-indigo-700 shadow-lg">
                        <h2 class="text-2xl font-bold text-white mb-2">Canary Strategy Enabled</h2>
                        <p class="text-indigo-200">This application is now managed using advanced traffic shifting rules.</p>
                    </div>
                </main>
            </div>
        </div>
    </body>
    </html>
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sample-web-rollout
  namespace: default
spec:
  replicas: 4
  strategy:
    canary:
      steps:
      - setWeight: 25
      - pause: { duration: 10s }
      - setWeight: 50
      - pause: { duration: 10s }
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-container
        image: nginx:1.25.5
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-html-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-web-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: web-app
