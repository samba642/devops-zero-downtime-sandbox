apiVersion: v1
kind: ConfigMap
metadata:
  name: web-html-config
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Analytics Dashboard - Dummy App</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-gray-100 font-sans antialiased">
        <div class="flex h-screen">
            <!-- Sidebar -->
            <div class="w-64 bg-gray-800 p-6 flex flex-col justify-between hidden md:flex border-r border-gray-700">
                <div>
                    <div class="flex items-center space-x-3 mb-8">
                        <div class="h-8 w-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white">Ω</div>
                        <span class="text-xl font-bold tracking-wider">AcmeCorp</span>
                    </div>
                    <nav class="space-y-2">
                        <a href="#" class="flex items-center space-x-3 bg-gray-900 text-indigo-400 p-3 rounded-lg font-medium"><span>📊</span> <span>Dashboard</span></a>
                        <a href="#" class="flex items-center space-x-3 text-gray-400 hover:bg-gray-700 hover:text-gray-200 p-3 rounded-lg transition"><span>👥</span> <span>Users</span></a>
                        <a href="#" class="flex items-center space-x-3 text-gray-400 hover:bg-gray-700 hover:text-gray-200 p-3 rounded-lg transition"><span>⚙️</span> <span>Settings</span></a>
                    </nav>
                </div>
                <div class="text-xs text-gray-500 text-center">v1.0.0 (GitOps Live)</div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Top Header -->
                <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
                    <h1 class="text-xl font-semibold">Overview</h1>
                    <div class="flex items-center space-x-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">● EKS Cluster Active</span>
                        <div class="h-8 w-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold">SR</div>
                    </div>
                </header>

                <!-- Dashboard Content -->
                <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-900 p-6">
                    <!-- Grid Cards -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                            <div class="text-gray-400 text-sm font-medium">Cluster Engine</div>
                            <div class="text-2xl font-bold mt-2 text-indigo-400">AWS EKS</div>
                            <div class="text-xs text-green-400 mt-2">↑ running t3.small</div>
                        </div>
                        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                            <div class="text-gray-400 text-sm font-medium">Deployment Status</div>
                            <div class="text-2xl font-bold mt-2 text-emerald-400">Healthy</div>
                            <div class="text-xs text-gray-400 mt-2">Managed via Argo CD</div>
                        </div>
                        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                            <div class="text-gray-400 text-sm font-medium">GitOps Sync</div>
                            <div class="text-2xl font-bold mt-2 text-amber-400">Automated</div>
                            <div class="text-xs text-amber-400 mt-2">True infrastructure-as-code</div>
                        </div>
                    </div>

                    <!-- Welcome Box -->
                    <div class="bg-gradient-to-r from-indigo-800 to-slate-800 p-8 rounded-xl border border-indigo-700 shadow-lg">
                        <h2 class="text-2xl font-bold text-white mb-2">Success! Your Pretty Dashboard is Live.</h2>
                        <p class="text-indigo-200 max-w-xl">This interface is being loaded straight from a Kubernetes ConfigMap. No local Docker required!</p>
                    </div>
                </main>
            </div>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-web-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-container
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: web-html-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-web-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: web-app
